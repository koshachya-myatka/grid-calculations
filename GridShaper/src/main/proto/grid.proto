syntax = "proto3";
option java_multiple_files = true;
package ru.paramonova.grpc;

message Circle {
    int32 x = 1;
    int32 y = 2;
    bool color = 3;
}

message Task {
    int32 taskId = 1;
    int32 fieldWidth = 2;
    int32 fieldLength = 3;
    int64 totalWhiteCombinations = 4;
    int64 totalBlackCombinations = 5;
    repeated Circle whiteCircles = 6;
    repeated Circle blackCircles = 7;
}

message Batch {
    int64 batchId = 1;
    int32 taskId = 2;
    repeated PipeList combinations = 3;
}

message Pipe {
    int32 x = 1;
    int32 y = 2;
    bool color = 3;
    int32 position = 4;
}

message PipeList {
    repeated Pipe pipes = 1;
}

message Line {
    int32 x = 1;
    int32 y = 2;
    int32 position = 3;
}

message Result {
    int64 batchId = 1;
    bool connected = 2;
    repeated Pipe pipes = 3;
    repeated Line lines = 4;
}

message TaskJsonRequest {
    string jsonString = 1;
}

message TaskIdResponse {
    int32 taskId = 1;
}

message TaskRequest {
    int32 taskId = 1;
}

message TaskResponse {
    Task task = 1;
}

message BatchResponse {
    Batch batch = 1;
}

message RegisterResponse {
    Task task = 1;
    bytes taskJar = 2;
}

message ResultsRequest {
    int32 taskId = 1;
    int64 batchId = 2;
    repeated Result results = 3;
}

message ResultsResponse {
    bool accepted = 1;
}

service GridService {
    rpc addTask(TaskJsonRequest) returns (TaskIdResponse);
    rpc registerTask(TaskRequest) returns (RegisterResponse);
    rpc getTaskInfo(TaskRequest) returns (TaskResponse);
    rpc getNextBatch(stream TaskRequest) returns (stream BatchResponse);
    rpc addResults(ResultsRequest) returns (ResultsResponse);
}