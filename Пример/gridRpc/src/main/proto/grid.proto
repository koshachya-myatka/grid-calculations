syntax = "proto3";
option java_multiple_files = true;

package org.example;


message TaskRequest{
    int32 id = 1;
}


message SubTaskRequest{
    int32 id = 1;
    int32 taskId = 2;
    string text = 3;
}

message Task{
    string text = 1;
}

service GridService {
    rpc getSubTask(stream TaskRequest) returns (stream SubTaskRequest);
    rpc addTask(Task) returns (TaskRequest);
}
