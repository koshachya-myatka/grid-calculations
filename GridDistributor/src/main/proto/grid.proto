syntax = "proto3";
option java_multiple_files = true;
package ru.paramonova.grpc;

message Circle {
    int32 x = 1;
    int32 y = 2;
    bool color = 3;
}

message Task {
    int32 taskId = 1;
    int32 fieldWidth = 2;
    int32 fieldLength = 3;
    int32 totalWhiteCombinations = 4;
    int32 totalBlackCombinations = 5;
    repeated Circle whiteCircles = 6;
    repeated Circle blackCircles = 7;
}

message Batch {
    int32 batchId = 1;
    int32 taskId = 2;
    int32 startWhiteCombination = 3;
    int32 numberWhiteCombinations = 4;
    int32 startBlackCombination = 5;
    int32 numberBlackCombinations = 6;
}

message Pipe {
    int32 x = 1;
    int32 y = 2;
    bool color = 3;
    int32 position = 4;
}

message Result {
    bool isConnected = 1;
    repeated Pipe pipes = 2;
}

message FileRequest {
    string fileName = 1;
    bytes fileData = 2;
}

message TaskIdResponse {
    int32 taskId = 1;
}

message TaskRequest {
    int32 taskId = 1;
}

message TaskResponse {
    Task task = 1;
}

message BatchResponse {
    Batch batch = 1;
}

message RegisterResponse {
    Task task = 1;
    bytes taskJar = 2;
}

message ResultsRequest {
    int32 taskId = 1;
    repeated Result results = 2;
}

message ResultsResponse {
    bool isAccepted = 1;
}

service GridService {
    rpc addTask(FileRequest) returns (TaskIdResponse);
    rpc registerTask(TaskRequest) returns (RegisterResponse);
    rpc getTaskInfo(TaskRequest) returns (TaskResponse);
    rpc getNextBatch(stream TaskRequest) returns (stream BatchResponse);
    rpc addResults(ResultsRequest) returns (ResultsResponse);
}